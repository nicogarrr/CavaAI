name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
      MONGODB_URI: mongodb://localhost:27017/cavaai_ci
      BETTER_AUTH_SECRET: ci-only-secret-that-is-long-enough-for-builds
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      FMP_BACKEND_URL: http://127.0.0.1:8000
      GEMINI_API_KEY: ci-placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  backend:
    name: Backend quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: data-engine
    env:
      APP_ENV: test
      DATABASE_URL: sqlite:///./cavaai_ci.db
      CAVAAI_ENABLE_VECTOR_INGEST: "0"
      CAVAAI_ENABLE_VECTOR_CHAT: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: data-engine/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt pytest ruff pyright
      - run: python -m ruff check .
      - run: pyright
      - run: python -m pytest
      - run: python scripts/run_financial_evals.py

  openapi-drift:
    name: OpenAPI generated client drift
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_ENV: test
      DATABASE_URL: sqlite:///./cavaai_openapi_ci.db
      RESEARCH_AUTH_REQUIRED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: data-engine/requirements.txt
      - run: npm ci
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r data-engine/requirements.txt
      - run: npm run generate:openapi
      - run: git diff --exit-code -- data-engine/openapi.json lib/research/openapi.generated.ts

  migrations:
    name: Postgres migration round trip
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: portfolio
          POSTGRES_PASSWORD: portfolio
          POSTGRES_DB: cavaai_research
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U portfolio -d cavaai_research"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    defaults:
      run:
        working-directory: data-engine
    env:
      DATABASE_URL: postgresql+psycopg://portfolio:portfolio@127.0.0.1:5432/cavaai_research
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: data-engine/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - name: Upgrade, downgrade, and re-upgrade
        run: |
          python -m alembic upgrade head
          python -m alembic downgrade base
          python -m alembic upgrade head

  supply-chain:
    name: Dependency audits
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: data-engine/requirements.txt
      - run: npm ci
      - name: Audit npm dependencies
        run: npm audit --audit-level=high
      - name: Install pip-audit
        if: ${{ always() }}
        run: python -m pip install --upgrade pip pip-audit
      - name: Audit Python dependencies
        if: ${{ always() }}
        run: python -m pip_audit -r data-engine/requirements.txt

  e2e:
    name: Research API E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: portfolio
          POSTGRES_PASSWORD: portfolio
          POSTGRES_DB: cavaai_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U portfolio -d cavaai_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      CI: "true"
      APP_ENV: test
      E2E_RUN: "1"
      E2E_API_URL: http://127.0.0.1:8000
      DATABASE_URL: postgresql+psycopg://portfolio:portfolio@127.0.0.1:5432/cavaai_e2e
      CAVAAI_ENABLE_VECTOR_INGEST: "0"
      CAVAAI_ENABLE_VECTOR_CHAT: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: data-engine/requirements.txt
      - run: npm ci
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r data-engine/requirements.txt
      - run: python -m alembic upgrade head
        working-directory: data-engine
      - run: npm run test:e2e
      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  browser-e2e:
    name: Browser E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
      E2E_UI_RUN: "1"
      RESEARCH_AUTH_SECRET: cavaai-browser-e2e-research-secret-at-least-32-characters
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: data-engine/requirements.txt
      - run: npm ci
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r data-engine/requirements.txt
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Upload browser report and traces
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: browser-playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
