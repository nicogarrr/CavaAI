# ============================================
# Docker Compose - Entorno Completo de Desarrollo
# ============================================

services:
  # ==========================================
  # MongoDB - auth and existing app data
  # ==========================================
  mongodb:
    image: mongo:7
    container_name: jlcava-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=jlcavaai
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:-root}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-example}
    healthcheck:
      test: ["CMD", "mongosh", "-u", "${MONGO_ROOT_USERNAME:-root}", "-p", "${MONGO_ROOT_PASSWORD:-example}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # PostgreSQL - research canonical store
  # ==========================================
  postgres:
    image: postgres:17
    container_name: jlcava-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-portfolio}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-portfolio}
      - POSTGRES_DB=${POSTGRES_DB:-cavaai_research}
      - TZ=UTC
      - PGTZ=UTC
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfolio} -d ${POSTGRES_DB:-cavaai_research}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ==========================================
  # Redis - cache, locks, budgets and jobs
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: jlcava-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  # ==========================================
  # Qdrant - vector store for RAG
  # ==========================================
  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: jlcava-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # ==========================================
  # MinIO - local S3-compatible raw document store
  # ==========================================
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: jlcava-minio
    restart: unless-stopped
    command: server --address ":9000" --console-address ":9001" /data
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-portfolio}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-portfoliosecret}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ==========================================
  # Backend Python (FastAPI)
  # ==========================================
  backend:
    build:
      context: ./data-engine
      dockerfile: Dockerfile
    container_name: jlcava-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data-engine:/app
      - /app/__pycache__
      - /app/.venv
    environment:
      - FMP_API_KEY=${FMP_API_KEY}
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-portfolio}:${POSTGRES_PASSWORD:-portfolio}@postgres:5432/${POSTGRES_DB:-cavaai_research}
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - VECTOR_STORE=qdrant
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-portfolio}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-portfoliosecret}
      - MINIO_BUCKET=research
      - DUCKDB_PATH=/app/storage/analytics.duckdb
      - LANGFUSE_HOST=http://langfuse-web:3000
      - LANGFUSE_ENABLED=${LANGFUSE_ENABLED:-false}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
    depends_on:
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy

  # ==========================================
  # Background worker - research jobs
  # ==========================================
  worker:
    build:
      context: ./data-engine
      dockerfile: Dockerfile
    container_name: jlcava-worker
    restart: unless-stopped
    volumes:
      - ./data-engine:/app
      - /app/__pycache__
      - /app/.venv
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-portfolio}:${POSTGRES_PASSWORD:-portfolio}@postgres:5432/${POSTGRES_DB:-cavaai_research}
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - VECTOR_STORE=qdrant
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-portfolio}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-portfoliosecret}
      - MINIO_BUCKET=research
      - SEC_USER_AGENT=${SEC_USER_AGENT:-CavaAI/0.1 contact@example.com}
      - RSS_FEEDS=${RSS_FEEDS:-}
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_started
    command: ["dramatiq", "app.workers.dramatiq_app"]

  # ==========================================
  # Scheduler - recurring research jobs
  # ==========================================
  scheduler:
    build:
      context: ./data-engine
      dockerfile: Dockerfile
    container_name: jlcava-scheduler
    restart: unless-stopped
    volumes:
      - ./data-engine:/app
      - /app/__pycache__
      - /app/.venv
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-portfolio}:${POSTGRES_PASSWORD:-portfolio}@postgres:5432/${POSTGRES_DB:-cavaai_research}
      - REDIS_URL=redis://redis:6379/0
      - TZ=UTC
    depends_on:
      redis:
        condition: service_started
    command: ["python", "-m", "app.workers.scheduler"]

  # ==========================================
  # Frontend Next.js
  # ==========================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: jlcava-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://${MONGO_ROOT_USERNAME:-root}:${MONGO_ROOT_PASSWORD:-example}@mongodb:27017/jlcavaai?authSource=admin
      - FMP_BACKEND_URL=http://backend:8000
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - FMP_API_KEY=${FMP_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    depends_on:
      - mongodb
      - backend

  # ==========================================
  # Langfuse observability profile
  # ==========================================
  clickhouse:
    profiles: ["observability"]
    image: clickhouse/clickhouse-server:24.8
    container_name: jlcava-clickhouse
    user: "101:101"
    ports:
      - "8123:8123"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    environment:
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_USER=clickhouse
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-clickhouse}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  langfuse-worker:
    profiles: ["observability"]
    image: langfuse/langfuse-worker:3
    container_name: jlcava-langfuse-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      NEXTAUTH_URL: http://localhost:3002
      DATABASE_URL: postgresql://${POSTGRES_USER:-portfolio}:${POSTGRES_PASSWORD:-portfolio}@postgres:5432/langfuse
      SALT: ${LANGFUSE_SALT:-cavaai-local-langfuse-salt}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:?Set LANGFUSE_ENCRYPTION_KEY in .env for observability profile}
      TELEMETRY_ENABLED: "false"
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_CONNECTION_STRING: redis://redis:6379/1
      LANGFUSE_BULLMQ_SKIP_REDIS_VERSION_CHECK: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-portfolio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-portfoliosecret}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-portfolio}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-portfoliosecret}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://localhost:9002
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"

  langfuse-web:
    profiles: ["observability"]
    image: langfuse/langfuse:3
    container_name: jlcava-langfuse-web
    depends_on:
      langfuse-worker:
        condition: service_started
    ports:
      - "3002:3000"
    environment:
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:?Set LANGFUSE_NEXTAUTH_SECRET in .env for observability profile}
      NEXTAUTH_URL: http://localhost:3002
      DATABASE_URL: postgresql://${POSTGRES_USER:-portfolio}:${POSTGRES_PASSWORD:-portfolio}@postgres:5432/langfuse
      SALT: ${LANGFUSE_SALT:-cavaai-local-langfuse-salt}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:?Set LANGFUSE_ENCRYPTION_KEY in .env for observability profile}
      TELEMETRY_ENABLED: "false"
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_CONNECTION_STRING: redis://redis:6379/1
      LANGFUSE_BULLMQ_SKIP_REDIS_VERSION_CHECK: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-portfolio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-portfoliosecret}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-portfolio}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-portfoliosecret}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://localhost:9002
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_INIT_ORG_ID: cavaai
      LANGFUSE_INIT_ORG_NAME: CavaAI
      LANGFUSE_INIT_PROJECT_ID: local
      LANGFUSE_INIT_PROJECT_NAME: Local Research
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-local}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-local}
      LANGFUSE_INIT_USER_EMAIL: local@example.com
      LANGFUSE_INIT_USER_NAME: Local Analyst
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:?Set LANGFUSE_INIT_USER_PASSWORD in .env for observability profile}

volumes:
  mongodb_data:
    name: jlcava-mongodb-data
  postgres_data:
    name: jlcava-postgres-data
  qdrant_data:
    name: jlcava-qdrant-data
  minio_data:
    name: jlcava-minio-data
  clickhouse_data:
    name: jlcava-clickhouse-data
  clickhouse_logs:
    name: jlcava-clickhouse-logs
